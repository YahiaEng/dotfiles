# ╔══════════════════════════════════════════════════════╗
# ║              MATUGEN CONFIGURATION                   ║
# ║       Material You dynamic color generation          ║
# ╚══════════════════════════════════════════════════════╝

[config]
reload_apps = true
prefix = "@"

[config.wallpaper]
command = "awww"
arguments = [
    "img",
    "--transition-type", "center",
    "--transition-duration", "2",
    "--transition-fps", "165",
]
set = true

[config.reload_apps_list]
waybar = true
kitty = true
gtk_theme = true

# ── Hyprland colors ─────────────────────────────────
[templates.hyprland]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/hypr/colors.conf"
post_hook = "hyprctl reload"

# ── Waybar colors ────────────────────────────────────
[templates.waybar]
input_path = "~/.config/matugen/templates/waybar-colors.css"
output_path = "~/.config/waybar/colors.css"
post_hook = "pkill -SIGUSR2 waybar"

# ── Kitty colors ─────────────────────────────────────
[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/colors.conf"
post_hook = "pkill -SIGUSR1 kitty"

# ── Wofi colors ──────────────────────────────────────
[templates.wofi]
input_path = "~/.config/matugen/templates/wofi-colors.css"
output_path = "~/.config/wofi/colors.css"

# ── SwayNC colors ────────────────────────────────────
[templates.swaync]
input_path = "~/.config/matugen/templates/swaync-colors.css"
output_path = "~/.config/swaync/colors.css"
post_hook = "swaync-client -rs"

# ── Yazi theme ───────────────────────────────────────
[templates.yazi]
input_path = "~/.config/matugen/templates/yazi-theme.toml"
output_path = "~/.config/yazi/theme.toml"

# ── VSCodium colors ─────────────────────────────────
[templates.vscodium]
input_path = "~/.config/matugen/templates/vscodium-colors.json"
output_path = "~/.cache/matugen-vscodium.json"
post_hook = "~/.config/hypr/scripts/vscodium-theme.sh materialyou"

# ── Wlogout colors ──────────────────────────────────
[templates.wlogout]
input_path = "~/.config/matugen/templates/wlogout-colors.css"
output_path = "~/.config/wlogout/colors.css"

# ── GTK 3.0 colors ─────────────────────────────────
[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-3.0/colors.css"
post_hook = "~/.config/hypr/scripts/gtk-reload.sh"

# ── GTK 4.0 colors ─────────────────────────────────
[templates.gtk4]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-4.0/colors.css"

# ── Walker colors ──────────────────────────────────
[templates.walker]
input_path = "~/.config/matugen/templates/waybar-colors.css"
output_path = "~/.config/walker/themes/rice/colors.css"
post_hook = "~/.config/hypr/scripts/walker-restart.sh"
