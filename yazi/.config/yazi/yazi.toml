# ~/.config/yazi/yazi.toml

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5

[preview]
wrap = "no"
tab_size = 2
max_width = 800
max_height = 1000
image_delay = 50

[opener]
edit = [
    { run = '${EDITOR:-nvim} "$@"', block = true, desc = "Edit" },
]
open = [
    { run = 'xdg-open "$@"', orphan = true, desc = "Open" },
]
reveal = [
    { run = 'thunar "$(dirname "$1")"', orphan = true, desc = "Reveal in Thunar" },
]

[open]
prepend_rules = [
    { name = "*.md", use = ["edit", "open"] },
    { name = "*.toml", use = ["edit"] },
    { name = "*.json", use = ["edit"] },
    { name = "*.jsonc", use = ["edit"] },
    { name = "*.conf", use = ["edit"] },
    { name = "*.sh", use = ["edit"] },
]
