# ~/.config/yazi/yazi.toml

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5

[preview]
wrap = "no"
tab_size = 2
max_width = 800
max_height = 1000
image_delay = 50

[opener]
edit = [
    { run = '${EDITOR:-nvim} "$@"', block = true, desc = "Edit" },
]
open = [
    { run = 'xdg-open "$@"', orphan = true, desc = "Open" },
]
reveal = [
    { run = 'thunar "$(dirname "$1")"', orphan = true, desc = "Reveal in Thunar" },
]

[open]
# Schema note: yazi (26.5.6-4) renamed the OpenRule matcher key from
# `name` to `url` (glob against the file's path) or `mime` (mime-type
# match) — `name` alone now fails to parse ("at least one of `url` or
# `mime` must be specified"), verified against the installed binary and
# upstream yazi-config/preset/yazi-default.toml (sxyazi/yazi@main).
prepend_rules = [
    { url = "*.md", use = ["edit", "open"] },
    { url = "*.toml", use = ["edit"] },
    { url = "*.json", use = ["edit"] },
    { url = "*.jsonc", use = ["edit"] },
    { url = "*.conf", use = ["edit"] },
    { url = "*.sh", use = ["edit"] },
]
