# ~/.dotfiles/hyprland/.config/hypr/hyprlock.conf

# Import the dynamic colors generated by Matugen
source = ~/.config/hypr/theme/hyprlock-colors.conf

background {
    monitor =
    # We will update our theme script to place the current wallpaper here
    path = ~/.cache/current_wallpaper.jpg
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    # Using the imported Matugen variables
    outer_color = $primary
    inner_color = $surface
    font_color = $text
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    color = $primary
    position = 0, 80
    halign = center
    valign = center
}