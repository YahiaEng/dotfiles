# ~/.dotfiles/fuzzel/.config/fuzzel/fuzzel.ini

# Import our color palette (Matugen will overwrite this file later)
include=~/.config/fuzzel/colors.ini

[main]
font=JetBrainsMono Nerd Font:size=14
# Launch terminal applications using kitty
terminal=kitty 
prompt="> "
layer=overlay
lines=10
width=40
horizontal-pad=20
vertical-pad=15
inner-pad=5
# Dismiss the launcher if you click elsewhere
exit-on-keyboard-focus-loss=yes 
image-size-ratio=0.5

[border]
width=2
radius=10