# Dracula — Yazi theme
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]
cwd = { fg = "#ff79c6" }
tab_active = { fg = "#282a36", bg = "#ff79c6", bold = true }
tab_inactive = { fg = "#6272a4", bg = "#44475a" }
border = { fg = "#6272a4" }
find_keyword = { fg = "#bd93f9", bold = true, underline = true }
find_position = { fg = "#ff79c6", italic = true }
marker_selected = { fg = "#bd93f9", bg = "#bd93f9" }
marker_copied = { fg = "#ff79c6", bg = "#ff79c6" }
marker_cut = { fg = "#ff5555", bg = "#ff5555" }
count_selected = { fg = "#282a36", bg = "#bd93f9", bold = true }
count_copied = { fg = "#282a36", bg = "#ff79c6", bold = true }
count_cut = { fg = "#282a36", bg = "#ff5555", bold = true }

[mode]
normal = { fg = "#282a36", bg = "#ff79c6", bold = true }
select = { fg = "#282a36", bg = "#bd93f9", bold = true }
unset = { fg = "#282a36", bg = "#ff5555", bold = true }

[status]
separator_open = { fg = "#44475a" }
separator_close = { fg = "#44475a" }
progress_label = { fg = "#f8f8f2", bold = true }
progress_normal = { fg = "#ff79c6" }
progress_error = { fg = "#ff5555" }
perm_read = { fg = "#ff79c6" }
perm_write = { fg = "#bd93f9" }
perm_exec = { fg = "#ff5555" }
perm_sep = { fg = "#6272a4" }

[input]
border = { fg = "#ff79c6" }
title = { fg = "#ff79c6" }
value = { fg = "#f8f8f2" }
selected = { reversed = true }

[pick]
border = { fg = "#ff79c6" }
active = { fg = "#ff79c6", bold = true }
inactive = { fg = "#f8f8f2" }

[confirm]
border = { fg = "#ff79c6" }
title = { fg = "#ff79c6" }
content = { fg = "#f8f8f2" }
list = { fg = "#f8f8f2" }
btn_yes = { fg = "#282a36", bg = "#ff79c6", bold = true }
btn_no = { fg = "#282a36", bg = "#6272a4", bold = true }

[completion]
border = { fg = "#ff79c6" }
active = { fg = "#ff79c6", bold = true }
inactive = { fg = "#6272a4" }

[help]
on = { fg = "#ff79c6" }
run = { fg = "#bd93f9" }
desc = { fg = "#f8f8f2" }
hovered = { reversed = true, bold = true }
footer = { fg = "#6272a4", italic = true }

[notify]
title_info = { fg = "#ff79c6" }
title_warn = { fg = "#bd93f9" }
title_error = { fg = "#ff5555" }
