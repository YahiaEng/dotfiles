# Nord — Yazi theme
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]
cwd = { fg = "#88c0d0" }
tab_active = { fg = "#2e3440", bg = "#88c0d0", bold = true }
tab_inactive = { fg = "#4c566a", bg = "#3b4252" }
border = { fg = "#4c566a" }
find_keyword = { fg = "#a3be8c", bold = true, underline = true }
find_position = { fg = "#88c0d0", italic = true }
marker_selected = { fg = "#a3be8c", bg = "#a3be8c" }
marker_copied = { fg = "#88c0d0", bg = "#88c0d0" }
marker_cut = { fg = "#bf616a", bg = "#bf616a" }
count_selected = { fg = "#2e3440", bg = "#a3be8c", bold = true }
count_copied = { fg = "#2e3440", bg = "#88c0d0", bold = true }
count_cut = { fg = "#2e3440", bg = "#bf616a", bold = true }

[mode]
normal = { fg = "#2e3440", bg = "#88c0d0", bold = true }
select = { fg = "#2e3440", bg = "#a3be8c", bold = true }
unset = { fg = "#2e3440", bg = "#bf616a", bold = true }

[status]
separator_open = { fg = "#3b4252" }
separator_close = { fg = "#3b4252" }
progress_label = { fg = "#eceff4", bold = true }
progress_normal = { fg = "#88c0d0" }
progress_error = { fg = "#bf616a" }
perm_read = { fg = "#88c0d0" }
perm_write = { fg = "#a3be8c" }
perm_exec = { fg = "#bf616a" }
perm_sep = { fg = "#4c566a" }

[input]
border = { fg = "#88c0d0" }
title = { fg = "#88c0d0" }
value = { fg = "#eceff4" }
selected = { reversed = true }

[pick]
border = { fg = "#88c0d0" }
active = { fg = "#88c0d0", bold = true }
inactive = { fg = "#eceff4" }

[confirm]
border = { fg = "#88c0d0" }
title = { fg = "#88c0d0" }
content = { fg = "#eceff4" }
list = { fg = "#eceff4" }
btn_yes = { fg = "#2e3440", bg = "#88c0d0", bold = true }
btn_no = { fg = "#2e3440", bg = "#4c566a", bold = true }

[completion]
border = { fg = "#88c0d0" }
active = { fg = "#88c0d0", bold = true }
inactive = { fg = "#4c566a" }

[help]
on = { fg = "#88c0d0" }
run = { fg = "#a3be8c" }
desc = { fg = "#eceff4" }
hovered = { reversed = true, bold = true }
footer = { fg = "#4c566a", italic = true }

[notify]
title_info = { fg = "#88c0d0" }
title_warn = { fg = "#a3be8c" }
title_error = { fg = "#bf616a" }
