# Rosé Pine — Yazi theme
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]
cwd = { fg = "#ebbcba" }
tab_active = { fg = "#191724", bg = "#ebbcba", bold = true }
tab_inactive = { fg = "#524f67", bg = "#26233a" }
border = { fg = "#524f67" }
find_keyword = { fg = "#f6c177", bold = true, underline = true }
find_position = { fg = "#ebbcba", italic = true }
marker_selected = { fg = "#f6c177", bg = "#f6c177" }
marker_copied = { fg = "#ebbcba", bg = "#ebbcba" }
marker_cut = { fg = "#eb6f92", bg = "#eb6f92" }
count_selected = { fg = "#191724", bg = "#f6c177", bold = true }
count_copied = { fg = "#191724", bg = "#ebbcba", bold = true }
count_cut = { fg = "#191724", bg = "#eb6f92", bold = true }

[mode]
normal = { fg = "#191724", bg = "#ebbcba", bold = true }
select = { fg = "#191724", bg = "#f6c177", bold = true }
unset = { fg = "#191724", bg = "#eb6f92", bold = true }

[status]
separator_open = { fg = "#26233a" }
separator_close = { fg = "#26233a" }
progress_label = { fg = "#e0def4", bold = true }
progress_normal = { fg = "#ebbcba" }
progress_error = { fg = "#eb6f92" }
perm_read = { fg = "#ebbcba" }
perm_write = { fg = "#f6c177" }
perm_exec = { fg = "#eb6f92" }
perm_sep = { fg = "#524f67" }

[input]
border = { fg = "#ebbcba" }
title = { fg = "#ebbcba" }
value = { fg = "#e0def4" }
selected = { reversed = true }

[pick]
border = { fg = "#ebbcba" }
active = { fg = "#ebbcba", bold = true }
inactive = { fg = "#e0def4" }

[confirm]
border = { fg = "#ebbcba" }
title = { fg = "#ebbcba" }
content = { fg = "#e0def4" }
list = { fg = "#e0def4" }
btn_yes = { fg = "#191724", bg = "#ebbcba", bold = true }
btn_no = { fg = "#191724", bg = "#524f67", bold = true }

[completion]
border = { fg = "#ebbcba" }
active = { fg = "#ebbcba", bold = true }
inactive = { fg = "#524f67" }

[help]
on = { fg = "#ebbcba" }
run = { fg = "#f6c177" }
desc = { fg = "#e0def4" }
hovered = { reversed = true, bold = true }
footer = { fg = "#524f67", italic = true }

[notify]
title_info = { fg = "#ebbcba" }
title_warn = { fg = "#f6c177" }
title_error = { fg = "#eb6f92" }
