# Catppuccin Mocha — Yazi theme
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]
cwd = { fg = "#cba6f7" }
tab_active = { fg = "#1e1e2e", bg = "#cba6f7", bold = true }
tab_inactive = { fg = "#585b70", bg = "#313244" }
border = { fg = "#585b70" }
find_keyword = { fg = "#89b4fa", bold = true, underline = true }
find_position = { fg = "#cba6f7", italic = true }
marker_selected = { fg = "#89b4fa", bg = "#89b4fa" }
marker_copied = { fg = "#cba6f7", bg = "#cba6f7" }
marker_cut = { fg = "#f38ba8", bg = "#f38ba8" }
count_selected = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
count_copied = { fg = "#1e1e2e", bg = "#cba6f7", bold = true }
count_cut = { fg = "#1e1e2e", bg = "#f38ba8", bold = true }

[mode]
normal = { fg = "#1e1e2e", bg = "#cba6f7", bold = true }
select = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
unset = { fg = "#1e1e2e", bg = "#f38ba8", bold = true }

[status]
separator_open = { fg = "#313244" }
separator_close = { fg = "#313244" }
progress_label = { fg = "#cdd6f4", bold = true }
progress_normal = { fg = "#cba6f7" }
progress_error = { fg = "#f38ba8" }
perm_read = { fg = "#cba6f7" }
perm_write = { fg = "#89b4fa" }
perm_exec = { fg = "#f38ba8" }
perm_sep = { fg = "#585b70" }

[input]
border = { fg = "#cba6f7" }
title = { fg = "#cba6f7" }
value = { fg = "#cdd6f4" }
selected = { reversed = true }

[pick]
border = { fg = "#cba6f7" }
active = { fg = "#cba6f7", bold = true }
inactive = { fg = "#cdd6f4" }

[confirm]
border = { fg = "#cba6f7" }
title = { fg = "#cba6f7" }
content = { fg = "#cdd6f4" }
list = { fg = "#cdd6f4" }
btn_yes = { fg = "#1e1e2e", bg = "#cba6f7", bold = true }
btn_no = { fg = "#1e1e2e", bg = "#585b70", bold = true }

[completion]
border = { fg = "#cba6f7" }
active = { fg = "#cba6f7", bold = true }
inactive = { fg = "#585b70" }

[help]
on = { fg = "#cba6f7" }
run = { fg = "#89b4fa" }
desc = { fg = "#cdd6f4" }
hovered = { reversed = true, bold = true }
footer = { fg = "#585b70", italic = true }

[notify]
title_info = { fg = "#cba6f7" }
title_warn = { fg = "#89b4fa" }
title_error = { fg = "#f38ba8" }
