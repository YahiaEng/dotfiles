# Tokyo Night — Yazi theme
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]
cwd = { fg = "#7aa2f7" }
tab_active = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
tab_inactive = { fg = "#414868", bg = "#24283b" }
border = { fg = "#414868" }
find_keyword = { fg = "#7dcfff", bold = true, underline = true }
find_position = { fg = "#7aa2f7", italic = true }
marker_selected = { fg = "#7dcfff", bg = "#7dcfff" }
marker_copied = { fg = "#7aa2f7", bg = "#7aa2f7" }
marker_cut = { fg = "#f7768e", bg = "#f7768e" }
count_selected = { fg = "#1a1b26", bg = "#7dcfff", bold = true }
count_copied = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
count_cut = { fg = "#1a1b26", bg = "#f7768e", bold = true }

[mode]
normal = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
select = { fg = "#1a1b26", bg = "#7dcfff", bold = true }
unset = { fg = "#1a1b26", bg = "#f7768e", bold = true }

[status]
separator_open = { fg = "#24283b" }
separator_close = { fg = "#24283b" }
progress_label = { fg = "#c0caf5", bold = true }
progress_normal = { fg = "#7aa2f7" }
progress_error = { fg = "#f7768e" }
perm_read = { fg = "#7aa2f7" }
perm_write = { fg = "#7dcfff" }
perm_exec = { fg = "#f7768e" }
perm_sep = { fg = "#414868" }

[input]
border = { fg = "#7aa2f7" }
title = { fg = "#7aa2f7" }
value = { fg = "#c0caf5" }
selected = { reversed = true }

[pick]
border = { fg = "#7aa2f7" }
active = { fg = "#7aa2f7", bold = true }
inactive = { fg = "#c0caf5" }

[confirm]
border = { fg = "#7aa2f7" }
title = { fg = "#7aa2f7" }
content = { fg = "#c0caf5" }
list = { fg = "#c0caf5" }
btn_yes = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
btn_no = { fg = "#1a1b26", bg = "#414868", bold = true }

[completion]
border = { fg = "#7aa2f7" }
active = { fg = "#7aa2f7", bold = true }
inactive = { fg = "#414868" }

[help]
on = { fg = "#7aa2f7" }
run = { fg = "#7dcfff" }
desc = { fg = "#c0caf5" }
hovered = { reversed = true, bold = true }
footer = { fg = "#414868", italic = true }

[notify]
title_info = { fg = "#7aa2f7" }
title_warn = { fg = "#7dcfff" }
title_error = { fg = "#f7768e" }
