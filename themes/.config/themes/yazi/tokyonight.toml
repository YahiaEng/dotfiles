# Tokyo Night — Yazi theme (auto-managed by theme-switch.sh)

[mgr]
cwd = { fg = "#7aa2f7", bold = true }
hovered = { bg = "#24283b", bold = true }
preview_hovered = { bg = "#24283b" }
find_keyword = { fg = "#7dcfff", bold = true, underline = true }
find_position = { fg = "#bb9af7", italic = true }
marker_selected = { fg = "#7aa2f7", bg = "#7aa2f7" }
marker_copied = { fg = "#7dcfff", bg = "#7dcfff" }
marker_cut = { fg = "#f7768e", bg = "#f7768e" }
tab_active = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
tab_inactive = { fg = "#c0caf5", bg = "#24283b" }
tab_width = 1
count_selected = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
count_copied = { fg = "#1a1b26", bg = "#7dcfff", bold = true }
count_cut = { fg = "#1a1b26", bg = "#f7768e", bold = true }
border_symbol = "│"
border_style = { fg = "#414868" }

[mode]
normal_main = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
normal_alt = { fg = "#7aa2f7", bg = "#24283b" }
select_main = { fg = "#1a1b26", bg = "#7dcfff", bold = true }
select_alt = { fg = "#7dcfff", bg = "#24283b" }
unset_main = { fg = "#1a1b26", bg = "#f7768e", bold = true }
unset_alt = { fg = "#f7768e", bg = "#24283b" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#24283b", bg = "#24283b" }
perm_type = { fg = "#7aa2f7" }
perm_read = { fg = "#7dcfff" }
perm_write = { fg = "#bb9af7" }
perm_exec = { fg = "#f7768e" }
perm_sep = { fg = "#414868" }

[pick]
border = { fg = "#7aa2f7" }
active = { fg = "#7aa2f7", bold = true }
inactive = { fg = "#a9b1d6" }

[input]
border = { fg = "#7aa2f7" }
title = { fg = "#7aa2f7" }
value = { fg = "#c0caf5" }
selected = { bg = "#24283b" }

[cmp]
border = { fg = "#7aa2f7" }
active = { fg = "#7aa2f7", bold = true }
inactive = { fg = "#a9b1d6" }
icon_file = ""
icon_folder = ""
icon_command = ""

[help]
on = { fg = "#7aa2f7" }
run = { fg = "#bb9af7" }
desc = { fg = "#a9b1d6" }
hovered = { bg = "#24283b", bold = true }
footer = { fg = "#c0caf5", bg = "#24283b" }

[notify]
title_info = { fg = "#7aa2f7" }
title_warn = { fg = "#bb9af7" }
title_error = { fg = "#f7768e" }
icon_info = ""
icon_warn = ""
icon_error = ""

[filetype]
rules = [
    # Media
    { mime = "image/*", fg = "#7dcfff" },
    { mime = "video/*", fg = "#bb9af7" },
    { mime = "audio/*", fg = "#bb9af7" },
    # Archives
    { mime = "application/zip", fg = "#f7768e" },
    { mime = "application/gzip", fg = "#f7768e" },
    { mime = "application/x-tar", fg = "#f7768e" },
    { mime = "application/x-bzip*", fg = "#f7768e" },
    { mime = "application/x-xz", fg = "#f7768e" },
    { mime = "application/x-7z-compressed", fg = "#f7768e" },
    { mime = "application/x-rar", fg = "#f7768e" },
    # Documents
    { mime = "application/pdf", fg = "#7aa2f7" },
    { mime = "application/doc", fg = "#7aa2f7" },
    { mime = "text/*", fg = "#c0caf5" },
    # Fallback
    { name = "*", fg = "#c0caf5" },
    { name = "*/", fg = "#7aa2f7", bold = true },
]
