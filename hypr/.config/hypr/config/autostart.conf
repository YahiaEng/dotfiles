# ╔══════════════════════════════════════════════════════╗
# ║                  AUTOSTART (UWSM)                     ║
# ║  All apps launched via uwsm app -- for proper         ║
# ║  systemd scope isolation and session management.       ║
# ║                                                        ║
# ║  UWSM handles dbus/portal env export automatically.   ║
# ╚══════════════════════════════════════════════════════╝

# ── Wallpaper daemon ─────────────────────────────────
exec-once = uwsm app -- swww-daemon

# ── Status bar ───────────────────────────────────────
exec-once = uwsm app -- ~/.config/hypr/scripts/waybar-launch.sh

# ── Notification daemon ──────────────────────────────
exec-once = uwsm app -- swaync

# ── Idle daemon ──────────────────────────────────────
exec-once = uwsm app -- hypridle

# ── Polkit agent ─────────────────────────────────────
exec-once = uwsm app -- /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Clipboard ────────────────────────────────────────
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# ── Apply last theme on login ────────────────────────
exec-once = sleep 1 && ~/.config/hypr/scripts/theme-init.sh
