# ╔══════════════════════════════════════════════════════╗
# ║                  AUTOSTART (UWSM)                    ║
# ║  All apps launched via uwsm app -- for proper        ║
# ║  systemd scope isolation and session management.     ║
# ╚══════════════════════════════════════════════════════╝

# ── Export env to dbus/systemd FIRST (before any GTK apps) ─
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE GTK_THEME XCURSOR_THEME XCURSOR_SIZE

# ── Wallpaper daemon ─────────────────────────────────
exec-once = uwsm app -- awww-daemon

# ── Status bar ───────────────────────────────────────
exec-once = uwsm app -- ~/.config/hypr/scripts/waybar-launch.sh

# ── Notification daemon ──────────────────────────────
exec-once = uwsm app -- swaync

# ── Application launcher (elephant backend + walker) ─
exec-once = uwsm app -- elephant
exec-once = uwsm app -- walker --gapplication-service

# ── Idle daemon ──────────────────────────────────────
exec-once = uwsm app -- hypridle

# ── Polkit agent ─────────────────────────────────────
exec-once = uwsm app -- /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Clipboard ────────────────────────────────────────
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# ── Apply last theme on login ────────────────────────
exec-once = sleep 2 && ~/.config/hypr/scripts/theme-init.sh
