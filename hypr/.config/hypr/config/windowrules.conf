# ╔══════════════════════════════════════════════════════╗
# ║                 WINDOW RULES                         ║
# ║          Hyprland 0.54+ syntax (match:)              ║
# ╚══════════════════════════════════════════════════════╝

# ── Float rules (grouped with named rules) ───────────

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = on
    size = 800 600
    center = on
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = on
    size = 800 600
    center = on
}

windowrule = float on, match:class ^(nm-applet)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(org\.gnome\.Calculator)$
windowrule = float on, match:class ^(org\.gnome\.Settings)$
windowrule = float on, match:class ^(imv)$
windowrule = float on, match:class ^(mpv)$

# Thunar dialogs
windowrule = float on, match:class ^(thunar)$, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(thunar)$, match:title ^(Confirm)

# ── Picture in picture ───────────────────────────────

windowrule {
    name = pip-rules
    match:title = [Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture
    float = on
    pin = on
    size = 480 270
    move = (monitor_w-490) (monitor_h-280)
}

# ── Wallpaper picker (floating kitty) ────────────────

windowrule {
    name = wallpaper-picker
    match:class = ^(wallpaper-picker)$
    float = on
    size = 75% 70%
    center = on
    animation = popin
}

# ── Yazi file manager (floating kitty) ───────────────

windowrule {
    name = yazi-fm
    match:class = ^(yazi-fm)$
    float = on
    size = 70% 65%
    center = on
    animation = popin
}

# ── Opacity rules ────────────────────────────────────

windowrule = opacity 0.88 0.85, match:class ^(kitty)$
windowrule = opacity 0.92 0.90, match:class ^(yazi-fm)$
windowrule = opacity 0.90 0.88, match:class ^(thunar)$
windowrule = opacity 0.90 0.88, match:class ^(code-url-handler)$
windowrule = opacity 0.90 0.88, match:class ^(Code)$
windowrule = opacity 0.90 0.88, match:class ^(codium-url-handler)$
windowrule = opacity 0.90 0.88, match:class ^(VSCodium)$

# ── Blur rules ───────────────────────────────────────

windowrule = no_blur on, match:class ^(firefox)$
windowrule = no_blur on, match:class ^(chromium)$

# ── Layer rules (wofi, waybar, swaync) ───────────────

layerrule = blur on, match:namespace wofi
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window

