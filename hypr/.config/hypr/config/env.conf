# ╔══════════════════════════════════════════════════════╗
# ║            ENVIRONMENT VARIABLES                      ║
# ║  Most env vars are now managed by UWSM:              ║
# ║    ~/.config/uwsm/env          (shared)               ║
# ║    ~/.config/uwsm/env-hyprland (NVIDIA/Hyprland)      ║
# ║                                                        ║
# ║  Only Hyprland-internal vars remain here.              ║
# ╚══════════════════════════════════════════════════════╝

# ── Cursor (needed by Hyprland itself) ───────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic

# ── Enabling Wayland for Electron Apps ───────────────
env = ELECTRON_OZONE_PLATFORM_HINT, auto
