# ╔══════════════════════════════════════════════════════╗
# ║                   HYPRLOCK                            ║
# ╚══════════════════════════════════════════════════════╝

source = ~/.local/state/theme/hyprland.conf

# NOTE (FIX-02, hyprlock 0.9.x option migration):
# - `grace` is no longer a config option (CLI-only `--grace`, default 0). No invocation
#   in this repo passes --grace, so the lock always requires a password immediately.
# - `no_fade_in`/`no_fade_out` were replaced by the animations{} block below.
# - `immediate_render` commits the lock surface without waiting for resources, shrinking
#   the startup window during which typed keys can't reach the password buffer.
# - `ignore_empty_input` (FIX-02 gap closure, UAT Test 2 / D-23): ENTER on an empty
#   password buffer is ignored outright, so no empty password is ever submitted to PAM.
#   This eliminates the ~2-3s input-blocked window (pam_unix failure delay) during which
#   real keystrokes were silently dropped, and stops pam_faillock tally growth from
#   repeated empty submits.
general {
    hide_cursor = true
    immediate_render = true
    ignore_empty_input = true
}

# ── Animations ───────────────────────────────────────
# fadeIn disabled (FIX-02): the lock screen appears at full opacity the instant the
# session is locked, so the visual "you can type now" cue matches when input actually
# registers. fadeOut and input-field animations keep their defaults.
animations {
    enabled = true
    animation = fadeIn, 0
}

# ── Background ───────────────────────────────────────
background {
    monitor =
    path = $image
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

# ── Time ─────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 96
    font_family = FiraCode Nerd Font Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 4
}

# ── Date ─────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = $on_surface
    font_size = 22
    font_family = FiraCode Nerd Font
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# ── Greeting ─────────────────────────────────────────
label {
    monitor =
    text = Hi, $USER
    color = $secondary
    font_size = 18
    font_family = FiraCode Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# ── Password input ───────────────────────────────────
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $primary
    inner_color = $surface
    font_color = $on_surface
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##a6adc8">  Enter Password...</span>
    hide_input = false
    rounding = 12
    check_color = $tertiary
    fail_color = $error
    fail_text = <i>$FAIL</i>
    # fail_transition removed (FIX-02): option no longer exists in hyprlock 0.9.x —
    # the fail-color transition is handled by the inputFieldColors animation (default).
    capslock_color = $secondary
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -120
    halign = center
    valign = center
    shadow_passes = 2
}
