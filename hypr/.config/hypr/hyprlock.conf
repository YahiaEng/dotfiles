# ╔══════════════════════════════════════════════════════╗
# ║                   HYPRLOCK                            ║
# ╚══════════════════════════════════════════════════════╝

source = ~/.config/hypr/colors.conf

general {
    grace = 5
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
}

# ── Background ───────────────────────────────────────
background {
    monitor =
    path = $image
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

# ── Time ─────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 96
    font_family = FiraCode Nerd Font Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 4
}

# ── Date ─────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = $on_surface
    font_size = 22
    font_family = FiraCode Nerd Font
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# ── Greeting ─────────────────────────────────────────
label {
    monitor =
    text = Hi, $USER
    color = $secondary
    font_size = 18
    font_family = FiraCode Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# ── Password input ───────────────────────────────────
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $primary
    inner_color = $surface
    font_color = $on_surface
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##a6adc8">  Enter Password...</span>
    hide_input = false
    rounding = 12
    check_color = $tertiary
    fail_color = $error
    fail_text = <i>$FAIL</i>
    fail_transition = 200
    capslock_color = $secondary
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -120
    halign = center
    valign = center
    shadow_passes = 2
}
