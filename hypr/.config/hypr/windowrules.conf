# ╔══════════════════════════════════════════════════════╗
# ║                 WINDOW RULES                          ║
# ╚══════════════════════════════════════════════════════╝

# ── Float rules ──────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-applet)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float, class:^(thunar)$, title:^(Confirm)
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(org.gnome.Settings)$
windowrulev2 = float, class:^(imv)$
windowrulev2 = float, class:^(mpv)$
windowrulev2 = float, title:^(Picture-in-Picture)$

# ── Size constraints for floating windows ────────────
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = size 800 600, class:^(blueman-manager)$
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(blueman-manager)$

# ── Picture in picture ───────────────────────────────
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 480 270, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-490 100%-280, title:^(Picture-in-Picture)$

# ── Opacity rules ────────────────────────────────────
windowrulev2 = opacity 0.88 0.85, class:^(kitty)$
windowrulev2 = opacity 0.90 0.88, class:^(thunar)$
windowrulev2 = opacity 0.90 0.88, class:^(code-url-handler)$
windowrulev2 = opacity 0.90 0.88, class:^(Code)$

# ── No blur for specific windows ─────────────────────
windowrulev2 = noblur, class:^(firefox)$
windowrulev2 = noblur, class:^(chromium)$

# ── Layer rules (for wofi, waybar, etc.) ─────────────
layerrule = blur, wofi
layerrule = blur, waybar
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, wofi
layerrule = ignorezero, waybar
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window

# ── Xwayland ─────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}
