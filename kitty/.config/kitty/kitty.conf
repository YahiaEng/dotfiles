# ╔══════════════════════════════════════════════════════╗
# ║              KITTY CONFIGURATION                      ║
# ╚══════════════════════════════════════════════════════╝

# ── Font ─────────────────────────────────────────────
font_family      FiraCode Nerd Font
bold_font        FiraCode Nerd Font Bold
italic_font      FiraCode Nerd Font Italic
bold_italic_font FiraCode Nerd Font Bold Italic
font_size        12.0

# ── Cursor ───────────────────────────────────────────
cursor_shape beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5

# ── Scrollback ───────────────────────────────────────
scrollback_lines 10000

# ── Window ───────────────────────────────────────────
window_padding_width 10 14
background_opacity 0.88
dynamic_background_opacity yes
confirm_os_window_close 0

# ── Tab bar ──────────────────────────────────────────
tab_bar_min_tabs 1
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# ── Bell ─────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── URLs ─────────────────────────────────────────────
url_style curly
detect_urls yes
open_url_with default

# ── Performance ──────────────────────────────────────
repaint_delay 6
input_delay 2
sync_to_monitor yes

# ── Keybindings ──────────────────────────────────────
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0
map ctrl+c copy_to_clipboard
# map ctrl+c copy_or_interrupt              # will copy only if there is a selection and send an interrupt otherwise
# map ctrl+c copy_and_clear_or_interrupt    # will copy and clear the selection or send an interrupt if there is no selection
# map ctrl+c copy_or_noop                   # will copy if there is a selection and pass the key through to the application running in the terminal if there is no selection.
map ctrl+v paste_from_clipboard
map ctrl+shift+c send_text all \x03
map ctrl+shift+r no_op

# ── Include colors (managed by theme-switch/matugen) ─
include colors.conf
